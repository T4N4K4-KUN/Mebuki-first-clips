<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <rect width="1080" height="1920" fill="#14171a"/>
  <text x="540" y="270" fill="#f5f7f2" font-family="Arial, sans-serif" font-size="58" text-anchor="middle">Errors become</text>
  <text x="540" y="340" fill="#7ee787" font-family="Arial, sans-serif" font-size="58" text-anchor="middle">the next action</text>
  <rect x="180" y="560" width="720" height="260" rx="24" fill="#2a1f1f" stroke="#ff7b72" stroke-width="5"/>
  <text x="540" y="710" fill="#f5f7f2" font-family="Arial, sans-serif" font-size="42" text-anchor="middle">warning</text>
  <rect x="180" y="920" width="720" height="180" rx="90" fill="#1d242b" stroke="#58a6ff"/>
  <text x="540" y="1030" fill="#f5f7f2" font-family="Arial, sans-serif" font-size="36" text-anchor="middle">explain, then fix</text>
  <rect x="320" y="1210" width="440" height="120" rx="60" fill="#7ee787"/>
  <text x="540" y="1285" fill="#121417" font-family="Arial, sans-serif" font-size="42" text-anchor="middle">fix applied</text>
